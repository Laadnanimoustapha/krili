<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krili - Project Suspended</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            color: red;
            font-size: 3em;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .content {
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .language-section {
            margin: 30px 0;
            padding: 20px;
            border: 1px solid #333;
            border-radius: 10px;
            background-color: #111;
        }

        .language-title {
            color: #ccc;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .message {
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .footer {
            margin-top: 50px;
            padding: 20px;
        }

        .project-link {
            display: inline-block;
            background-color: #333;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 5px;
            border: 2px solid #555;
            transition: all 0.3s ease;
            font-size: 1.1em;
        }

        .project-link:hover {
            background-color: #555;
            border-color: #777;
            color: #fff;
        }

        /* Arabic text styling */
        .arabic {
            direction: rtl;
            text-align: right;
            font-size: 1.2em;
        }

        /* French text styling */
        .french {
            font-style: italic;
        }

        /* English text styling */
        .english {
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Warning</h1>
    
    <div class="content">
        <!-- Arabic Section -->
        <div class="language-section">
            <div class="language-title">العربية</div>
            <div class="message arabic">
                تم تعليق مشروع كريلي الآن حتى وقت آخر
            </div>
        </div>

        <!-- French Section -->
        <div class="language-section">
            <div class="language-title">Français</div>
            <div class="message french">
                Le projet Krili a été suspendu pour l'instant jusqu'à une autre fois
            </div>
        </div>

        <!-- English Section -->
        <div class="language-section">
            <div class="language-title">English</div>
            <div class="message english">
                The Krili project has been suspended for now until another time
            </div>
        </div>
    </div>

    <div class="footer">
        <a href="https://admin-panel-reactv0.netlify.app/" class="project-link" target="_blank">
            To see my current project here
        </a>
    </div>
</body>
</html>
