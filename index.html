            background: linear-gradient(to right, #74ebd5, #acb6e5);

            flex-direction: column;
            align-items: center;

            list-style-type: none;
            padding: 0;

        li {

        }

        a {
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;

            color: #333;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;

        a:hover {

            color: #ffffff;
        }
