<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - KRILI</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="security.js"></script>
  <style>
    :root {
      --bg-color: #0a0a0a;
      --text-color: #ffffff;
      --text-secondary: #a1a1aa;
      --card-bg: rgba(255, 255, 255, 0.03);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --accent-primary: #3b82f6;
      --accent-secondary: #2563eb;
      --accent-tertiary: #1d4ed8;
      --gradient-primary: linear-gradient(135deg, #3b82f6 0%, #2563eb 50%, #1d4ed8 100%);
      --shadow-primary: 0 0 50px rgba(59, 130, 246, 0.3);
    }

    body[data-theme="light"] {
      --bg-color: #ffffff;
      --text-color: #1a1a1a;
      --text-secondary: #4b5563;
      --card-bg: rgba(255, 255, 255, 0.9);
      --glass-bg: rgba(255, 255, 255, 0.8);
      --shadow-primary: 0 10px 40px rgba(0, 0, 0, 0.08);
    }

    body[data-theme="light"] .register-container {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
    }

    body[data-theme="light"] .form-group input {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    body[data-theme="light"] .form-group input:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    body[data-theme="light"] .social-btn {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    body[data-theme="light"] .theme-toggle {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .register-container {
      width: 100%;
      max-width: 500px;
      padding: 2rem;
      background: var(--card-bg);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: var(--shadow-primary);
    }

    .logo {
      text-align: center;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 2rem;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo img {
      height: 70px;
      max-width: 100%;
      display: block;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      background: var(--glass-bg);
      color: var(--text-color);
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .register-btn {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 10px;
      background: var(--gradient-primary);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .register-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-primary);
    }

    .divider {
      text-align: center;
      margin: 1.5rem 0;
      position: relative;
    }

    .divider::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 45%;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    .divider::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      width: 45%;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    .social-login {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .social-btn {
      padding: 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      background: var(--glass-bg);
      color: var(--text-color);
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .social-btn:hover {
      background: var(--gradient-primary);
      color: white;
      transform: translateY(-2px);
    }

    .login-link {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-secondary);
    }

    .login-link a {
      color: var(--accent-primary);
      text-decoration: none;
      font-weight: 600;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: var(--glass-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50px;
      padding: 0.75rem 1.5rem;
      color: var(--text-color);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .theme-toggle:hover {
      background: var(--gradient-primary);
      color: white;
      transform: translateY(-2px);
      box-shadow: var(--shadow-primary);
    }

    .notification {
      position: fixed;
      top: 2rem;
      right: 2rem;
      padding: 1rem 1.5rem;
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      color: var(--text-color);
      backdrop-filter: blur(10px);
      transform: translateX(120%);
      transition: transform 0.3s ease;
      z-index: 1001;
      max-width: 300px;
    }

    .notification.show {
      transform: translateX(0);
    }

    .notification.success {
      border-left: 4px solid #22c55e;
    }

    .notification.error {
      border-left: 4px solid #ef4444;
    }

    .login-logo img {
      height: 120px;
      max-width: 100%;
      display: block;
      margin: 0 auto;
    }

    @media (max-width: 480px) {
      .register-container {
        margin: 1rem;
        padding: 1.5rem;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .social-login {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KS7XT0KVEP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-KS7XT0KVEP');
  </script>
</head>
<body oncontextmenu="return false;">

  <header>
    <div class="header-content" style="display:flex;justify-content:flex-end;align-items:center;max-width:800px;margin:0 auto;">
      <button class="theme-toggle" onclick="toggleTheme()">
        <i id="theme-icon" class="fas fa-moon"></i>
        <span>Theme</span>
      </button>
    </div>
  </header>

  <div class="register-container">
    <div class="logo">
      <img src="lw__2_-removebg-preview.png" alt="KRILI">
    </div>
    
    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" required placeholder="Enter your first name">
        </div>
        
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" required placeholder="Enter your last name">
        </div>
      </div>
      
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="Enter your email">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Create a password">
      </div>
      
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" required placeholder="Confirm your password">
      </div>
      
      <button type="submit" class="register-btn">Create Account</button>
    </form>
    
    <div class="divider">or</div>
    
    <div class="social-login">
      <button class="social-btn" onclick="socialRegister('google')">
        <i class="fab fa-google"></i>
        Google
      </button>
      <button class="social-btn" onclick="socialRegister('facebook')">
        <i class="fab fa-facebook-f"></i>
        Facebook
      </button>
    </div>
    
    <div class="login-link">
      Already have an account? <a href="login-test1.html">Login here</a>
    </div>
  </div>

  <div class="notification" id="notification"></div>

  <script>
    // Theme toggle functionality
    function toggleTheme() {
      const body = document.body;
      const themeIcon = document.getElementById('theme-icon');
      const currentTheme = body.getAttribute('data-theme');
      
      if (currentTheme === 'light') {
        body.removeAttribute('data-theme');
        themeIcon.className = 'fas fa-moon';
        showNotification('Switched to dark theme', 'success');
      } else {
        body.setAttribute('data-theme', 'light');
        themeIcon.className = 'fas fa-sun';
        showNotification('Switched to light theme', 'success');
      }
    }

    // Registration form handling
    async function handleRegister(event) {
      event.preventDefault();
      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        showNotification('Passwords do not match!', 'error');
        return;
      }

      const response = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ firstName, lastName, email, password })
      });

      const result = await response.json();
      if (result.status === 'success') {
        showNotification('Account created successfully!', 'success');
        setTimeout(() => (window.location.href = 'login-test1.html'), 1500);
      } else {
        showNotification(result.message || 'Registration failed', 'error');
      }
    }

    // Social registration handling
    function socialRegister(provider) {
      showNotification(`Registering with ${provider}...`, 'info');
      setTimeout(() => {
        showNotification(`${provider} registration successful! Redirecting...`, 'success');
        setTimeout(() => {
          window.location.href = 'rent-test1.html';
        }, 1500);
      }, 1500);
    }

    // Notification system
    function showNotification(message, type = 'info', duration = 3000) {
      const notification = document.getElementById('notification');
      notification.textContent = message;
      notification.className = `notification ${type}`;
      notification.classList.add('show');

      setTimeout(() => {
        notification.classList.remove('show');
      }, duration);
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      // T for theme toggle
      if (e.key === 't' || e.key === 'T') {
        if (document.activeElement.tagName !== 'INPUT') {
          toggleTheme();
        }
      }
      
      // Escape to close notifications
      if (e.key === 'Escape') {
        document.querySelector('.notification').classList.remove('show');
      }
    });

    // Logout functionality
    function logout() {
      showNotification('Logging out...', 'info');
      // Clear login status from localStorage
      localStorage.removeItem('isLoggedIn');
      localStorage.removeItem('userEmail');
      setTimeout(() => {
        showNotification('Successfully logged out', 'success');
        window.location.href = 'login-test1.html';
      }, 1500);
    }
  </script>
</body>
</html>
