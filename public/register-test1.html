<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - KRILI</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="js/security.js"></script>
  <style>
  
  </style>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KS7XT0KVEP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-KS7XT0KVEP');
  </script>
</head>
<body oncontextmenu="return false;">

  <header>
    <div class="header-content" style="display:flex;justify-content:flex-end;align-items:center;max-width:800px;margin:0 auto;">
      <button class="theme-toggle" onclick="toggleTheme()">
        <i id="theme-icon" class="fas fa-moon"></i>
        <span>Theme</span>
      </button>
    </div>
  </header>

  <div class="register-container">
    <div class="logo">
      
    </div>
    
    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" required placeholder="Enter your first name">
        </div>
        
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" required placeholder="Enter your last name">
        </div>
      </div>
      
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="Enter your email">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Create a password">
      </div>
      
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" required placeholder="Confirm your password">
      </div>
      
      <button type="submit" class="register-btn">Create Account</button>
    </form>
    
    <div class="divider">or</div>
    
    <div class="social-login">
      <button class="social-btn" onclick="socialRegister('google')">
        <i class="fab fa-google"></i>
        Google
      </button>
      <button class="social-btn" onclick="socialRegister('facebook')">
        <i class="fab fa-facebook-f"></i>
        Facebook
      </button>
    </div>
    
    <div class="login-link">
      Already have an account? <a href="login-test1.html">Login here</a>
    </div>
  </div>
  <div class="notification" id="notification"></div>
  <script src="js/regester.js"></script>
</body>
</html>
